<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC RCR - Inspeção (v4.0)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#147b6a">
    
    <style>
        :root { --parvi-teal: #147b6a; --totalpass-lime: #4eff7e; --parvi-cream: #faf8f5; --parvi-white: #ffffff; --parvi-text: #333333; --parvi-border: #c4e1df; --red: #d93025; --orange: #f9ab00; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 15px; background: var(--parvi-cream); color: var(--parvi-text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 100%; max-width: 580px; background: var(--parvi-white); border-radius: 14px; border: 1px solid var(--parvi-border); padding: 30px; box-shadow: 0 10px 30px rgba(20,123,106,0.05); box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--parvi-teal); padding-bottom: 15px; }
        .header h2 { margin: 0; color: var(--parvi-teal); font-size: 22px; font-weight: 800; }
        .offline-badge { display: none; background: var(--orange); color: #333; padding: 8px; border-radius: 6px; text-align: center; font-size: 12px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .form-group { margin-bottom: 18px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--parvi-teal); margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--parvi-border); border-radius: 8px; font-size: 14px; box-sizing: border-box; background: var(--parvi-cream); }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--parvi-teal); background: white; }
        optgroup { font-weight: bold; color: var(--parvi-teal); background: #eef7f6; }
        .radio-box { display: flex; gap: 20px; padding: 12px; background: rgba(20,123,106,0.04); border-radius: 8px; border: 1px dashed var(--parvi-border); }
        .radio-option { display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .radio-option input { width: auto; margin: 0; }
        .conditional-field { display: none; padding: 18px; background: rgba(78, 255, 126, 0.08); border-radius: 10px; border-left: 4px solid var(--parvi-teal); margin-top: 10px; box-sizing: border-box; }
        .sub-field-fotos { background: rgba(255, 255, 255, 0.6); padding: 12px; border-radius: 8px; border: 1px solid var(--parvi-border); margin-bottom: 12px; }
        .preview-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .preview-item { width: 80px; height: 80px; border-radius: 6px; overflow: hidden; border: 2px solid var(--parvi-border); }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-submit { width: 100%; padding: 15px; background: var(--parvi-teal); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-top: 15px; }
        .btn-submit:hover { background: #0e5e52; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        #msg { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-size: 13px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>REGISTRO DE INSPEÇÃO (v4.0)</h2>
    </div>

    <div id="offlineAlert" class="offline-badge" onclick="tentarSincronizarPendentes()">
        ⚠️ DETETADOS <span id="offlineCount">0</span> REGISTOS OFFLINE. CLIQUE PARA ENVIAR.
    </div>

    <form id="inspectionForm">
        <div class="form-row">
            <div class="form-group">
                <label>Veículo (Ordem ou Placa)</label>
                <input type="text" id="veiculo" style="text-transform: uppercase;" required>
            </div>
            <div class="form-group">
                <label>Filial</label>
                <select id="filial" required>
                    <option value="">Selecione...</option>
                    <option value="MA">MA</option>
                    <option value="PER">PE</option>
                    <option value="BAH">BAH</option>
                    <option value="BAR">BAR</option>
                    <option value="PEB">PEB</option>
                    <option value="CE">CE</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="dataVerificacao" required>
            </div>
            <div class="form-group">
                <label>Horário</label>
                <input type="time" id="horarioVerificacao" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nome do Responsável</label>
            <input type="text" id="responsavel" required>
        </div>

        <div class="form-group">
            <label>Categoria</label>
            <select id="categoriaDefeito" required>
                <option value="">Selecione o problema...</option>
                <optgroup label="Câmera">
                    <option value="CÂMERA - Ajuste Frontal/Colisão">Ajuste Câmera Frontal / Colisão</option>
                    <option value="CÂMERA - Ajuste Fadiga">Ajuste Câmera de Fadiga</option>
                    <option value="CÂMERA - DVR Inoperante">DVR Inoperante</option>
                    <option value="CÂMERA - Erro de Disco (Storage)">Erro de Disco (Armazenamento)</option>
                    <option value="CÂMERA - Inoperante">Câmera inoperante (Descreva)</option>
                    <option value="CÂMERA - Outro">Outro (Descreva)</option>
                </optgroup>
                <optgroup label="Telemetria">
                    <option value="TELEMETRIA - GPS Inoperante">GPS Inoperante</option>
                    <option value="TELEMETRIA - Sirene ativada constante">Sirene ativada constante</option>
                    <option value="TELEMETRIA - Sirene não funciona">Sirene não funciona</option>
                    <option value="TELEMETRIA - Leitora">Leitora</option>
                    <option value="TELEMETRIA - Outro">Outro (Descreva)</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>Descrição Detalhada</label>
            <textarea id="defeito" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Houve Solução Imediata?</label>
            <div class="radio-box">
                <label class="radio-option"><input type="radio" name="solucao" value="SIM" onclick="toggleFields(true)" required> Sim, resolvido</label>
                <label class="radio-option"><input type="radio" name="solucao" value="NAO" onclick="toggleFields(false)"> Não, encaminhado</label>
            </div>
        </div>

        <div id="fieldSim" class="conditional-field">
            <div class="sub-field-fotos">
                <label>1. Evidência do ANTES</label>
                <input type="file" id="fotosAntes" accept="image/*" multiple onchange="previewImages('fotosAntes', 'previewAntes')">
                <div class="preview-container" id="previewAntes"></div>
            </div>
            <div class="sub-field-fotos">
                <label>2. Evidência do DEPOIS</label>
                <input type="file" id="fotosDepois" accept="image/*" multiple onchange="previewImages('fotosDepois', 'previewDepois')">
                <div class="preview-container" id="previewDepois"></div>
            </div>
        </div>

        <div id="fieldNao" class="conditional-field" style="background: rgba(217, 48, 37, 0.05); border-left-color: var(--red);">
            <label style="color: var(--red);">Número da O.S. / Chamado</label>
            <input type="text" id="chamado">
        </div>

        <button type="submit" id="btnS" class="btn-submit">SINCRONIZAR COM A NUVEM</button>
        <div id="msg"></div>
    </form>
</div>

<script>
    // ======= COLE O NOVO LINK AQUI (O QUE GEROU NO PASSO 2) =======
    const APP_URL = "https://script.google.com/macros/s/AKfycbzL92XQRBX0RWjbD3yfyj9odgVEfwnk9PUolokzfsDtuZQRDTScnTHrkfenEv14G37qnQ/exec";
    // ===============================================================

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) { registration.unregister(); }
        });
    }

    window.onload = () => {
        const agora = new Date();
        document.getElementById('dataVerificacao').value = agora.toISOString().split('T')[0];
        document.getElementById('horarioVerificacao').value = agora.toTimeString().split(' ')[0].substring(0,5);
        if (localStorage.getItem('rcr_ultimo_inspetor')) document.getElementById('responsavel').value = localStorage.getItem('rcr_ultimo_inspetor');
    };

    function toggleFields(houveSolucao) {
        document.getElementById('fieldSim').style.display = houveSolucao ? 'block' : 'none';
        document.getElementById('fieldNao').style.display = houveSolucao ? 'none' : 'block';
        document.getElementById('chamado').required = !houveSolucao;
    }

    function previewImages(inputId, previewId) {
        const previewArea = document.getElementById(previewId);
        previewArea.innerHTML = "";
        const files = document.getElementById(inputId).files;
        for(let file of files) {
            const reader = new FileReader();
            const div = document.createElement('div');
            div.className = 'preview-item';
            const img = document.createElement('img');
            reader.onload = (e) => { img.src = e.target.result; div.appendChild(img); previewArea.appendChild(div); }
            reader.readAsDataURL(file);
        }
    }

    function compressImage(file, marcaDaguaTexto) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const MAX = 800;
                    if (w > MAX) { h = Math.round((h * MAX) / w); w = MAX; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    const fSize = Math.max(14, Math.floor(w * 0.035));
                    ctx.font = `bold ${fSize}px sans-serif`;
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; 
                    ctx.fillRect(0, h - fSize - 10, w, fSize + 10);
                    ctx.fillStyle = '#4eff7e'; 
                    ctx.fillText(marcaDaguaTexto, 10, h - 5);
                    
                    resolve(canvas.toDataURL('image/jpeg', 0.6).split(',')[1]); 
                };
            };
        });
    }

    document.getElementById('inspectionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnS');
        const msg = document.getElementById('msg');
        
        const solucao = document.querySelector('input[name="solucao"]:checked').value;
        const antesFiles = document.getElementById('fotosAntes').files;
        const depoisFiles = document.getElementById('fotosDepois').files;

        if (solucao === "SIM" && (antesFiles.length === 0 || depoisFiles.length === 0)) {
            alert("⚠️ Obrigatório anexar fotos do ANTES e DEPOIS quando a solução é SIM.");
            return;
        }

        btn.disabled = true;
        msg.style.display = "block";
        msg.style.background = "#fff3cd";
        msg.style.color = "#856404";
        msg.innerText = "Preparando pacote de envio (Aguarde)...";

        const veiculoLimpo = document.getElementById('veiculo').value.replace(/[\s-]/g, '').toUpperCase();
        const responsavelStr = document.getElementById('responsavel').value;
        const descCompleta = `[${document.getElementById('categoriaDefeito').value}] ${document.getElementById('defeito').value}`;
        const textoMarcaDagua = `RCR | VTR: ${veiculoLimpo} | Insp: ${responsavelStr.split(' ')[0]}`;
        
        localStorage.setItem('rcr_ultimo_inspetor', responsavelStr);

        let listaArquivosDrive = [];
        
        if (solucao === "SIM") {
            for (let i = 0; i < antesFiles.length; i++) {
                btn.innerText = `PROCESSANDO FOTOS...`;
                const b64 = await compressImage(antesFiles[i], textoMarcaDagua);
                listaArquivosDrive.push({ base64: b64, nome: `${veiculoLimpo}_ANTES_${i+1}.jpg` });
            }
            for (let i = 0; i < depoisFiles.length; i++) {
                const b64 = await compressImage(depoisFiles[i], textoMarcaDagua);
                listaArquivosDrive.push({ base64: b64, nome: `${veiculoLimpo}_DEPOIS_${i+1}.jpg` });
            }
        }

        const payload = {
            action: "salvar_inspecao",
            veiculo: veiculoLimpo,
            data: document.getElementById('dataVerificacao').value,
            hora: document.getElementById('horarioVerificacao').value,
            filial: document.getElementById('filial').value,
            responsavel: responsavelStr,
            defeito: descCompleta,
            solucao: solucao,
            fotosArray: listaArquivosDrive,
            chamado: document.getElementById('chamado').value
        };

        try {
            btn.innerText = "A ENVIAR PARA O GOOGLE DRIVE...";
            await fetch(APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            });

            msg.style.background = "var(--totalpass-lime)";
            msg.style.color = "#333";
            msg.innerText = "✅ Salvo com sucesso!";
            document.getElementById('inspectionForm').reset();
            document.getElementById('responsavel').value = responsavelStr;
            document.getElementById('previewAntes').innerHTML = "";
            document.getElementById('previewDepois').innerHTML = "";
            toggleFields(false);

        } catch (err) {
            msg.style.background = "var(--red)";
            msg.style.color = "white";
            msg.innerText = "❌ Falha na conexão de rede.";
        } finally {
            btn.disabled = false;
            btn.innerText = "SINCRONIZAR COM A NUVEM";
        }
    });
</script>
</body>
</html>
