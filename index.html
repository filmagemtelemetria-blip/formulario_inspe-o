<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC RCR - Inspeção Profissional (Firebase)</title>
    
    <style>
        :root { --parvi-teal: #147b6a; --totalpass-lime: #4eff7e; --parvi-cream: #faf8f5; --parvi-white: #ffffff; --parvi-text: #333333; --parvi-border: #c4e1df; --red: #d93025; --orange: #f9ab00; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 15px; background: var(--parvi-cream); color: var(--parvi-text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 100%; max-width: 580px; background: var(--parvi-white); border-radius: 14px; border: 1px solid var(--parvi-border); padding: 30px; box-shadow: 0 10px 30px rgba(20,123,106,0.05); box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--parvi-teal); padding-bottom: 15px; }
        .header h2 { margin: 0; color: var(--parvi-teal); font-size: 22px; font-weight: 800; }
        .form-group { margin-bottom: 18px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--parvi-teal); margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--parvi-border); border-radius: 8px; font-size: 14px; box-sizing: border-box; background: var(--parvi-cream); }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--parvi-teal); background: white; }
        optgroup { font-weight: bold; color: var(--parvi-teal); background: #eef7f6; }
        .radio-box { display: flex; gap: 20px; padding: 12px; background: rgba(20,123,106,0.04); border-radius: 8px; border: 1px dashed var(--parvi-border); }
        .radio-option { display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .conditional-field { display: none; padding: 18px; background: rgba(78, 255, 126, 0.08); border-radius: 10px; border-left: 4px solid var(--parvi-teal); margin-top: 10px; box-sizing: border-box; }
        .sub-field-fotos { background: rgba(255, 255, 255, 0.6); padding: 12px; border-radius: 8px; border: 1px solid var(--parvi-border); margin-bottom: 12px; }
        .preview-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .preview-item { width: 80px; height: 80px; border-radius: 6px; overflow: hidden; border: 2px solid var(--parvi-border); }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-submit { width: 100%; padding: 15px; background: var(--parvi-teal); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-top: 15px; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        #msg { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-size: 13px; font-weight: bold; display: none; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>REGISTRO DE INSPEÇÃO</h2>
    </div>

    <form id="inspectionForm">
        <div class="form-row">
            <div class="form-group">
                <label>Veículo (Ordem/Placa)</label>
                <input type="text" id="veiculo" style="text-transform: uppercase;" required>
            </div>
            <div class="form-group">
                <label>Filial</label>
                <select id="filial" required>
                    <option value="">Selecione...</option>
                    <option value="MA">MA</option><option value="PER">PE</option><option value="BAH">BAH</option>
                    <option value="BAR">BAR</option><option value="PEB">PEB</option><option value="CE">CE</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="dataVerificacao" required>
            </div>
            <div class="form-group">
                <label>Horário</label>
                <input type="time" id="horarioVerificacao" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nome do Responsável</label>
            <input type="text" id="responsavel" required>
        </div>

        <div class="form-group">
            <label>Categoria do Defeito</label>
            <select id="categoriaDefeito" required>
                <option value="">Selecione o problema...</option>
                <optgroup label="Câmera">
                    <option value="CÂMERA - Frontal/Colisão">Ajuste Frontal / Colisão</option>
                    <option value="CÂMERA - Fadiga">Ajuste Fadiga</option>
                    <option value="CÂMERA - DVR Inoperante">DVR Inoperante</option>
                    <option value="CÂMERA - Erro Disco">Erro de Disco</option>
                    <option value="CÂMERA - Inoperante">Câmera inoperante</option>
                    <option value="CÂMERA - Outro">Outro</option>
                </optgroup>
                <optgroup label="Telemetria">
                    <option value="TELEMETRIA - GPS">GPS Inoperante</option>
                    <option value="TELEMETRIA - Sirene Direta">Sirene ativada constante</option>
                    <option value="TELEMETRIA - Sirene Quebrada">Sirene não funciona</option>
                    <option value="TELEMETRIA - Leitora">Leitora</option>
                    <option value="TELEMETRIA - Outro">Outro</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>Descrição Detalhada</label>
            <textarea id="defeito" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Houve Solução Imediata?</label>
            <div class="radio-box">
                <label class="radio-option"><input type="radio" name="solucao" value="SIM" onclick="toggleFields(true)" required> Sim</label>
                <label class="radio-option"><input type="radio" name="solucao" value="NAO" onclick="toggleFields(false)"> Não</label>
            </div>
        </div>

        <div id="fieldSim" class="conditional-field">
            <div class="sub-field-fotos">
                <label>1. FOTOS DO ANTES</label>
                <input type="file" id="fotosAntes" accept="image/*" multiple onchange="previewImages('fotosAntes', 'previewAntes')">
                <div class="preview-container" id="previewAntes"></div>
            </div>
            <div class="sub-field-fotos">
                <label>2. FOTOS DO DEPOIS</label>
                <input type="file" id="fotosDepois" accept="image/*" multiple onchange="previewImages('fotosDepois', 'previewDepois')">
                <div class="preview-container" id="previewDepois"></div>
            </div>
        </div>

        <div id="fieldNao" class="conditional-field" style="background: rgba(217, 48, 37, 0.05); border-left-color: var(--red);">
            <label style="color: var(--red);">Número da O.S. / Chamado</label>
            <input type="text" id="chamado">
        </div>

        <button type="submit" id="btnS" class="btn-submit">ENVIAR RELATÓRIO</button>
        <div id="msg"></div>
    </form>
</div>

<script>
    // =========================================================
    // COLE AQUI AS SUAS CREDENCIAIS DO FIREBASE (PASSO 5)
    // =========================================================
    const firebaseConfig = {
        apiKey: "AIzaSyA8f8t05-USu8hceG3tEdg-MXsjorur7MM",
        authDomain: "noc-rcr-inspecoes-2dc6d.firebaseapp.com",
        projectId: "noc-rcr-inspecoes-2dc6d",
        storageBucket: "noc-rcr-inspecoes-2dc6d.appspot.com",
        messagingSenderId: "745787948707",
        appId: "1:745787948707:web:599657761a84882cd28916"
    };

    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    // =========================================================

    window.onload = () => {
        const agora = new Date();
        document.getElementById('dataVerificacao').value = agora.toISOString().split('T')[0];
        document.getElementById('horarioVerificacao').value = agora.toTimeString().split(' ')[0].substring(0,5);
        if (localStorage.getItem('rcr_inspetor')) document.getElementById('responsavel').value = localStorage.getItem('rcr_inspetor');
    };

    function toggleFields(isSim) {
        document.getElementById('fieldSim').style.display = isSim ? 'block' : 'none';
        document.getElementById('fieldNao').style.display = isSim ? 'none' : 'block';
        document.getElementById('chamado').required = !isSim;
    }

    function previewImages(inputId, previewId) {
        const area = document.getElementById(previewId);
        area.innerHTML = "";
        const files = document.getElementById(inputId).files;
        for(let file of files) {
            const r = new FileReader();
            const div = document.createElement('div'); div.className = 'preview-item';
            const img = document.createElement('img');
            r.onload = e => { img.src = e.target.result; div.appendChild(img); area.appendChild(div); }
            r.readAsDataURL(file);
        }
    }

    // Compressão com Marca D'água
    function compressImage(file, texto) {
        return new Promise((resolve) => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const MAX = 800; // Firebase aguenta fotos de excelente qualidade
                    if (w > MAX) { h = Math.round((h * MAX) / w); w = MAX; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    ctx.font = `bold 16px sans-serif`;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, h-30, w, 30);
                    ctx.fillStyle = '#4eff7e'; ctx.fillText(texto, 10, h-10);
                    
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]); 
                };
            };
        });
    }

    document.getElementById('inspectionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnS');
        const msg = document.getElementById('msg');
        
        const solucao = document.querySelector('input[name="solucao"]:checked').value;
        const antes = document.getElementById('fotosAntes').files;
        const depois = document.getElementById('fotosDepois').files;

        if (solucao === "SIM" && (antes.length === 0 || depois.length === 0)) {
            alert("⚠️ Insira fotos do Antes e Depois.");
            return;
        }

        btn.disabled = true; msg.style.display = "block"; msg.style.background = "#fff3cd"; msg.style.color = "#856404";
        msg.innerText = "A Enviar para o Servidor RCR...";

        const veiculo = document.getElementById('veiculo').value.toUpperCase();
        const resp = document.getElementById('responsavel').value;
        const def = `[${document.getElementById('categoriaDefeito').value}] ${document.getElementById('defeito').value}`;
        const carimbo = `VTR: ${veiculo} | Insp: ${resp.split(' ')[0]} | ${document.getElementById('dataVerificacao').value.split('-').reverse().join('/')}`;
        
        localStorage.setItem('rcr_inspetor', resp);

        let linksImagens = [];

        try {
            // UPLOAD DAS FOTOS PARA O STORAGE DO FIREBASE
            if (solucao === "SIM") {
                const processarFotos = async (arquivos, tipo) => {
                    for (let i = 0; i < arquivos.length; i++) {
                        btn.innerText = `A gravar foto ${tipo} ${i+1}/${arquivos.length}...`;
                        const b64 = await compressImage(arquivos[i], carimbo);
                        const nomeArquivo = `inspecoes/${veiculo}_${Date.now()}_${tipo}_${i+1}.jpg`;
                        const ref = storage.ref().child(nomeArquivo);
                        
                        // Envia para o servidor e apanha a URL limpa!
                        await ref.putString(b64, 'base64', { contentType: 'image/jpeg' });
                        const urlDown = await ref.getDownloadURL();
                        linksImagens.push(`[${tipo}]: ${urlDown}`);
                    }
                };

                await processarFotos(antes, 'ANTES');
                await processarFotos(depois, 'DEPOIS');
            }

            btn.innerText = "A GUARDAR RELATÓRIO...";

            // GRAVA OS DADOS (E OS LINKS) NO BANCO DE DADOS FIRESTORE
            await db.collection("relatorios").add({
                data_criacao: firebase.firestore.FieldValue.serverTimestamp(),
                veiculo: veiculo,
                data: document.getElementById('dataVerificacao').value,
                hora: document.getElementById('horarioVerificacao').value,
                filial: document.getElementById('filial').value,
                responsavel: resp,
                defeito: def,
                solucao: solucao,
                chamado: document.getElementById('chamado').value || "N/A",
                linksFotos: linksImagens
            });

            msg.style.background = "var(--totalpass-lime)"; msg.style.color = "#333";
            msg.innerText = "✅ Relatório gravado com SUCESSO!";
            document.getElementById('inspectionForm').reset();
            document.getElementById('previewAntes').innerHTML = ""; document.getElementById('previewDepois').innerHTML = "";
            toggleFields(false);

        } catch (err) {
            console.error("Erro Firebase:", err);
            msg.style.background = "var(--red)"; msg.style.color = "white";
            msg.innerText = "❌ Falha no envio. Erro: " + err.message;
        } finally {
            btn.disabled = false; btn.innerText = "ENVIAR RELATÓRIO";
        }
    });
</script>
</body>
</html>
